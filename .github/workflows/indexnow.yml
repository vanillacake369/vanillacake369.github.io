name: IndexNow Notify

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Fetch sitemap and submit to IndexNow
        env:
          SITE_HOST: vanillacake369.github.io
          INDEXNOW_KEY: 281e35d30f8b4961fe5ffe2f24b2dfaa
        run: |
          set -euo pipefail

          SITEMAP_URL="https://${SITE_HOST}/sitemap-0.xml"
          KEY_LOCATION="https://${SITE_HOST}/${INDEXNOW_KEY}.txt"

          echo "Fetching sitemap: ${SITEMAP_URL}"
          curl -sSf "${SITEMAP_URL}" -o /tmp/sitemap.xml

          # Extract <loc> URLs (one per line)
          grep -oE '<loc>[^<]+</loc>' /tmp/sitemap.xml \
            | sed -E 's|</?loc>||g' > /tmp/urls.txt

          URL_COUNT=$(wc -l < /tmp/urls.txt)
          echo "Found ${URL_COUNT} URLs"

          if [[ "${URL_COUNT}" -eq 0 ]]; then
            echo "No URLs to submit; aborting."
            exit 0
          fi

          # Build JSON payload (URLs already absolute, percent-encoded)
          jq -Rn \
            --arg host "${SITE_HOST}" \
            --arg key "${INDEXNOW_KEY}" \
            --arg keyLoc "${KEY_LOCATION}" \
            '{
              host: $host,
              key: $key,
              keyLocation: $keyLoc,
              urlList: [inputs]
            }' < /tmp/urls.txt > /tmp/payload.json

          echo "Submitting to IndexNow..."
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w '%{http_code}' \
            -X POST 'https://api.indexnow.org/IndexNow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data-binary @/tmp/payload.json)

          echo "HTTP ${HTTP_CODE}"
          cat /tmp/response.txt || true
          echo

          # IndexNow returns 200 (accepted) or 202 (accepted, processing).
          # 422 means invalid key/host. 429 means rate limited.
          case "${HTTP_CODE}" in
            200|202) echo "✓ IndexNow accepted ${URL_COUNT} URLs" ;;
            *) echo "✗ IndexNow rejected (HTTP ${HTTP_CODE})"; exit 1 ;;
          esac
